<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方project 角色wiki</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 0;
            background-image: url(./background.jpg);
            backdrop-filter: blur(10px);
            background-size: cover;
            background-position: center center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .music-player {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .music-player:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .music-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff69b4;
            font-size: 20px;
        }

        .music-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 105, 180, 0.6);
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .music-title {
            font-size: 12px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }

        .music-status {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .music-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .wave {
            width: 3px;
            background: linear-gradient(to top, #ff69b4, #ff1493);
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .wave:nth-child(1) { height: 8px; animation-delay: 0s; }
        .wave:nth-child(2) { height: 14px; animation-delay: 0.1s; }
        .wave:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .wave:nth-child(4) { height: 16px; animation-delay: 0.3s; }
        .wave:nth-child(5) { height: 12px; animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }

        .music-waves.paused .wave {
            animation-play-state: paused;
        }

        .preview-container {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .preview-container.show {
            opacity: 1;
        }

        .preview-container img {
            width: 200px;
            height: 280px;
            border-radius: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #ff1493, #4169e1, #9370db) padding-box, linear-gradient(135deg, #ff1493, #4169e1, #9370db) border-box;
        }

        .preview-container img:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            border: 4px solid transparent;
            background: linear-gradient(135deg, #ff1493, #4169e1, #9370db) padding-box, linear-gradient(135deg, #ff1493, #4169e1, #9370db) border-box;
        }

        .preview-container .name {
            color: #5b5b5b;
            font-size: 32px;
            font-family: '宋体', sans-serif;
            margin-top: 15px;
        }

        .carousel-container {
            position: fixed;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        .carousel-item {
            position: absolute;
            transition: all 0.5s ease;
        }

        .carousel-item img {
            width: 200px;
            height: 280px;
            border-radius: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            object-fit: cover;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #ff1493, #4169e1, #9370db) padding-box, linear-gradient(135deg, #ff1493, #4169e1, #9370db) border-box;
        }

        .carousel-item.center img {
            width: 280px;
            height: 380px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.6);
            border: 4px solid transparent;
            background: linear-gradient(135deg, #ff1493, #4169e1, #9370db) padding-box, linear-gradient(135deg, #ff1493, #4169e1, #9370db) border-box;
        }

        .carousel-item:hover img {
            transform: translateY(-30px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.8);
            border: 4px solid transparent;
            background: linear-gradient(135deg, #ff1493, #4169e1, #9370db) padding-box, linear-gradient(135deg, #ff1493, #4169e1, #9370db) border-box;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="music-player" id="musicPlayer">
        <div class="music-icon">🎵</div>
        <button class="music-btn" id="playPauseBtn">▶</button>
        <div class="music-info">
            <div class="music-title">东方Project BGM</div>
            <div class="music-status" id="musicStatus">准备播放</div>
        </div>
        <div class="music-waves paused" id="musicWaves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
    </div>

    <audio id="bgMusic" src="./music0.mp3" loop></audio>

    <div class="preview-container" id="preview">
        <img id="preview-img" src="" alt="">
        <div class="name" id="preview-name"></div>
    </div>

    <div class="carousel-container">
        <div class="carousel" id="carousel">
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const musicStatus = document.getElementById('musicStatus');
        const musicWaves = document.getElementById('musicWaves');

        function initMusicPlayer() {
            const savedTime = localStorage.getItem('bgMusicTime');
            const wasPlaying = localStorage.getItem('bgMusicPlaying') === 'true';

            if (savedTime) {
                bgMusic.currentTime = parseFloat(savedTime);
            }

            if (wasPlaying) {
                bgMusic.play().then(() => {
                    updateMusicStatus(true);
                }).catch(err => {
                    console.log('Auto-play prevented:', err);
                    updateMusicStatus(false);
                });
            }
        }

        function togglePlay() {
            if (bgMusic.paused) {
                bgMusic.play();
                updateMusicStatus(true);
            } else {
                bgMusic.pause();
                updateMusicStatus(false);
            }
        }

        function updateMusicStatus(isPlaying) {
            if (isPlaying) {
                playPauseBtn.textContent = '⏸';
                musicStatus.textContent = '正在播放';
                musicWaves.classList.remove('paused');
                localStorage.setItem('bgMusicPlaying', 'true');
            } else {
                playPauseBtn.textContent = '▶';
                musicStatus.textContent = '已暂停';
                musicWaves.classList.add('paused');
                localStorage.setItem('bgMusicPlaying', 'false');
            }
        }

        function saveMusicTime() {
            localStorage.setItem('bgMusicTime', bgMusic.currentTime);
        }

        playPauseBtn.addEventListener('click', togglePlay);

        bgMusic.addEventListener('timeupdate', saveMusicTime);

        document.addEventListener('click', function initOnInteraction() {
            if (bgMusic.paused && localStorage.getItem('bgMusicPlaying') !== 'false') {
                bgMusic.play().then(() => {
                    updateMusicStatus(true);
                }).catch(err => {
                    console.log('Play failed:', err);
                });
            }
            document.removeEventListener('click', initOnInteraction);
        }, { once: true });

        initMusicPlayer();

        const characters = [
            { href: './SMWW/index.html', img: './SMWW/lihui0.jpg', alt: '🙛射命丸文🙙' },
            { href: './BLLM/index.html', img: './BLLM/lihui.jpeg', alt: '🙛博丽灵梦🙙' },
            { href: './HPYM/index.html', img: './HPYM/lihui.jpeg', alt: '🙛魂魄妖梦🙙' },
            { href: './HKTY/index.html', img: './HKTY/lihui.jpeg', alt: '​🙛赫卡提亚🙙​' },
            { href: './SLYXY/index.html', img: './SLYXY/lihui.jpeg', alt: '🙛​十六夜咲夜🙙' },
            { href: './WYMLS/index.html', img: './WYMLS/lihui.jpeg', alt: '​🙛雾雨魔理沙​🙙' },
            { href: './LMLY/index.html', img: './LMLY/lihui.jpeg', alt: '​🙛蕾米莉亚​🙙' }
        ];

        let targetIndex = Math.floor(characters.length / 2);
        const radius = 350;
        const totalItems = characters.length;
        let wheelTimeout = null;

        function initCarousel() {
            const carousel = document.getElementById('carousel');
            carousel.innerHTML = '';

            characters.forEach((char, index) => {
                const item = document.createElement('div');
                item.className = 'carousel-item';
                item.dataset.index = index;
                item.innerHTML = `<img src="${char.img}" alt="${char.alt}">`;
                carousel.appendChild(item);
            });

            updateCarousel(false);
            updatePreview();
        }

        function updateCarousel(animate = true) {
            const items = document.querySelectorAll('.carousel-item');
            const angleStep = 180 / (totalItems + 1);

            items.forEach((item, index) => {
                let angle = (index - targetIndex) * angleStep;
                let adjustedAngle = angle - 90;

                const radian = (adjustedAngle * Math.PI) / 180;
                const x = Math.cos(radian) * radius;
                const y = Math.sin(radian) * radius * 0.3;

                const distanceFromCenter = Math.abs(index - targetIndex);
                const scale = 1 - distanceFromCenter * 0.1;

                item.style.transition = animate ? 'all 0.5s ease' : 'none';
                item.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${angle}deg) scale(${Math.max(scale, 0.6)})`;
                item.style.zIndex = index;

                if (index === targetIndex) {
                    item.classList.add('center');
                } else {
                    item.classList.remove('center');
                }
            });

            updatePreview();
        }

        function updatePreview() {
            const preview = document.getElementById('preview');
            const previewImg = document.getElementById('preview-img');
            const previewName = document.getElementById('preview-name');

            preview.classList.remove('show');

            setTimeout(() => {
                previewImg.src = characters[targetIndex].img;
                previewName.textContent = characters[targetIndex].alt;
                preview.classList.add('show');
            }, 300);
        }

        function handleCarouselClick(index) {
            targetIndex = parseInt(index);
            updateCarousel(true);
        }

        function handlePreviewClick(index) {
            window.location.href = characters[index].href;
        }

        document.getElementById('carousel').addEventListener('click', (e) => {
            const item = e.target.closest('.carousel-item');
            if (item) {
                handleCarouselClick(item.dataset.index);
            }
        });

        document.getElementById('preview').addEventListener('click', () => {
            handlePreviewClick(targetIndex);
        });

        document.addEventListener('wheel', (e) => {
            if (wheelTimeout) return;
            
            wheelTimeout = setTimeout(() => {
                wheelTimeout = null;
            }, 400);

            if (e.deltaY > 0) {
                targetIndex = (targetIndex + 1) % totalItems;
            } else {
                targetIndex = (targetIndex - 1 + totalItems) % totalItems;
            }
            updateCarousel(true);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                targetIndex = (targetIndex + 1) % totalItems;
                updateCarousel(true);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                targetIndex = (targetIndex - 1 + totalItems) % totalItems;
                updateCarousel(true);
            } else if (e.key === 'Enter') {
                handlePreviewClick(targetIndex);
            }
        });

        initCarousel();

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const maxParticles = 100;
        const connectionDistance = 150;
        const mouseDistance = 200;

        let mouse = {
            x: null,
            y: null
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(${Math.random() * 100 + 155}, ${Math.random() * 100 + 155}, ${Math.random() * 100 + 155}, 0.8)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) {
                    this.vx *= -1;
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.vy *= -1;
                }

                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouseDistance) {
                        const force = (mouseDistance - distance) / mouseDistance;
                        this.vx += (dx / distance) * force * 0.5;
                        this.vy += (dy / distance) * force * 0.5;
                    }
                }

                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 1.5) {
                    this.vx = (this.vx / speed) * 1.5;
                    this.vy = (this.vy / speed) * 1.5;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        const opacity = 1 - (distance / connectionDistance);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 105, 180, ${opacity * 0.5})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            if (mouse.x !== null && mouse.y !== null) {
                for (let i = 0; i < particles.length; i++) {
                    const dx = mouse.x - particles[i].x;
                    const dy = mouse.y - particles[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouseDistance) {
                        const opacity = 1 - (distance / mouseDistance);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(65, 105, 225, ${opacity * 0.8})`;
                        ctx.lineWidth = 1.5;
                        ctx.moveTo(mouse.x, mouse.y);
                        ctx.lineTo(particles[i].x, particles[i].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            connectParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
